{% set name = "defaultlist" %}
{% set version = "1.2.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/defaultlist-{{ version }}.tar.gz
  sha256: 2a023dedd77cb66b09cfe24c5587bae96f028e613157a871c8172e205ba6961f

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python >=2.6
  run:
    - python >=2.6

test:
  imports:
    - defaultlist
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/c0fec0de/defaultlist
  summary: collections.defaultdict equivalent implementation of list.
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - AndLen
